name = "sonicvault-metadata"
main = "worker.js"
compatibility_date = "2025-01-01"

# Secrets (set with `wrangler secret put <NAME>`, never commit these):
#   ANTHROPIC_API_KEY        required — Anthropic API key the worker calls Claude with
#   SONICVAULT_CLIENT_TOKEN  optional — bearer token the web UI must send as Authorization
#
# Vars below are non-secret and safe to keep in source control.
[vars]
# Comma-separated origin allowlist for CORS. The deployed app plus local dev.
ALLOWED_ORIGIN = "https://bobbynacario-design.github.io,http://localhost:8487,http://127.0.0.1:8487"
